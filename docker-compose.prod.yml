services:
  db:
    image: postgres:15-alpine
    container_name: smmplan_lite_prod_db
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-smmplan_lite}
    volumes:
      - prod_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smmplan_lite_prod_redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - prod_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: smmplan_lite_prod_app:latest
    container_name: smmplan_lite_prod_app
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-smmplan_lite}?schema=public&connection_limit=5&pool_timeout=30
      - REDIS_URL=redis://redis:6379 
      - APP_ENCRYPTION_KEY=${APP_ENCRYPTION_KEY}
      - ADMIN_ALERT_BOT_TOKEN=${ADMIN_ALERT_BOT_TOKEN}
      - ADMIN_ALERT_CHAT_ID=${ADMIN_ALERT_CHAT_ID}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - BASE_URL=${BASE_URL}
      - YOO_SHOP_ID=${YOO_SHOP_ID}
      - YOO_SECRET_KEY=${YOO_SECRET_KEY}
      - CRYPTOBOT_TOKEN=${CRYPTOBOT_TOKEN}
      - CRON_SECRET=${CRON_SECRET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: smmplan_lite_prod_nginx
    restart: always
    ports:
      - "3001:80"
      - "3002:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    depends_on:
      - app

  bot:
    image: smmplan_lite_prod_app:latest
    container_name: smmplan_lite_prod_bot
    restart: unless-stopped
    command: ["npx", "tsx", "src/bot/index.ts"]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-smmplan_lite}?schema=public&connection_limit=5&pool_timeout=30
      - REDIS_URL=redis://redis:6379 
      - APP_ENCRYPTION_KEY=${APP_ENCRYPTION_KEY}
      - CRON_SECRET=${CRON_SECRET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: smmplan_lite_prod_app:latest
    container_name: smmplan_lite_prod_worker
    restart: always
    command: ["npx", "tsx", "src/workers/index.ts"]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-smmplan_lite}?schema=public&connection_limit=5&pool_timeout=30
      - REDIS_URL=redis://redis:6379 
      - APP_ENCRYPTION_KEY=${APP_ENCRYPTION_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  certbot:
    image: certbot/certbot
    container_name: smmplan_lite_prod_certbot
    restart: unless-stopped
    volumes:
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  prod_postgres_data:
  prod_redis_data:

