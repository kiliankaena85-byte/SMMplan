services:
  db:
    image: postgres:15-alpine
    container_name: smmplan_lite_prod_db
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-smmplan_lite}
    volumes:
      - prod_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smmplan_lite_prod_redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - prod_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: smmplan_lite_prod_app:latest
    container_name: smmplan_lite_prod_app
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-smmplan_lite}?schema=public&connection_limit=5&pool_timeout=30
      - REDIS_URL=redis://redis:6379 
      - APP_ENCRYPTION_KEY=${APP_ENCRYPTION_KEY}
      - ADMIN_ALERT_BOT_TOKEN=${ADMIN_ALERT_BOT_TOKEN}
      - ADMIN_ALERT_CHAT_ID=${ADMIN_ALERT_CHAT_ID}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - BASE_URL=${BASE_URL}
      - YOO_SHOP_ID=${YOO_SHOP_ID}
      - YOO_SECRET_KEY=${YOO_SECRET_KEY}
      - CRYPTOBOT_TOKEN=${CRYPTOBOT_TOKEN}
      - CRON_SECRET=${CRON_SECRET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: smmplan_lite_prod_nginx
    restart: always
    ports:
      - "3001:80"
      - "3002:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    depends_on:
      - app

  bot:
    image: smmplan_lite_prod_app:latest
    container_name: smmplan_lite_prod_bot
    restart: unless-stopped
    command: ["npx", "tsx", "src/bot/index.ts"]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-smmplan_lite}?schema=public&connection_limit=5&pool_timeout=30
      - REDIS_URL=redis://redis:6379 
      - APP_ENCRYPTION_KEY=${APP_ENCRYPTION_KEY}
      - CRON_SECRET=${CRON_SECRET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: smmplan_lite_prod_app:latest
    container_name: smmplan_lite_prod_worker
    restart: always
    command: ["npx", "tsx", "src/workers/index.ts"]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-smmplan_lite}?schema=public&connection_limit=5&pool_timeout=30
      - REDIS_URL=redis://redis:6379 
      - APP_ENCRYPTION_KEY=${APP_ENCRYPTION_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  certbot:
    image: certbot/certbot
    container_name: smmplan_lite_prod_certbot
    restart: unless-stopped
    volumes:
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # ── Backup Service (P0.1) ──────────────────────────────────────────────────
  backup:
    image: alpine:3.19
    container_name: smmplan_lite_prod_backup
    restart: always
    # Install required tools and run crond
    command: >
      sh -c "
        apk add --no-cache postgresql16-client gzip gnupg wget rclone supercronic &&
        echo '0 * * * * /scripts/backup-db.sh hourly >> /var/log/backup.log 2>&1' > /etc/crontabs/backup &&
        echo '0 3 * * * /scripts/backup-db.sh daily >> /var/log/backup.log 2>&1' >> /etc/crontabs/backup &&
        echo '0 4 * * 0 /scripts/backup-db.sh verify >> /var/log/backup.log 2>&1' >> /etc/crontabs/backup &&
        supercronic /etc/crontabs/backup
      "
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-smmplan_lite}?schema=public
      - BACKUP_GPG_PASSPHRASE=${BACKUP_GPG_PASSPHRASE}
      - RCLONE_REMOTE=${RCLONE_REMOTE:-yadisk}
      - ADMIN_ALERT_BOT_TOKEN=${ADMIN_ALERT_BOT_TOKEN}
      - ADMIN_ALERT_CHAT_ID=${ADMIN_ALERT_CHAT_ID}
    volumes:
      - ./scripts/backup-db.sh:/scripts/backup-db.sh:ro
      - prod_backups:/backups
      - ~/.config/rclone:/root/.config/rclone:ro # rclone OAuth config
    depends_on:
      db:
        condition: service_healthy

  # ── Loki (Log Storage) (P0.2) ─────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.4
    container_name: smmplan_lite_prod_loki
    restart: always
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - prod_loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Promtail (Log Collector) (P0.2) ───────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.4
    container_name: smmplan_lite_prod_promtail
    restart: always
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./loki/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro # Docker socket for container discovery
    depends_on:
      loki:
        condition: service_healthy

  # ── Grafana (Log UI) (P0.2) ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.1
    container_name: smmplan_lite_prod_grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    ports:
      - "3200:3000" # Access at http://server:3200 (close in firewall, use nginx proxy)
    volumes:
      - prod_grafana_data:/var/lib/grafana
    depends_on:
      - loki

volumes:
  prod_postgres_data:
  prod_redis_data:
  prod_backups:     # P0.1: Local backup storage (48h hourly, 7d daily)
  prod_loki_data:   # P0.2: Loki log storage (90d retention)
  prod_grafana_data: # P0.2: Grafana dashboards and settings

